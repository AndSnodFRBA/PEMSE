<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — PEMSE</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 14px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .login-title { font-size: 20px; font-weight: 600; color: #1a2e4a; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: #5a7a9a; margin-bottom: 24px; }
    .form-label  { font-size: 13px; font-weight: 500; color: #374151; }
    .btn-staff   { background: #1a2e4a; color: #fff; border: none; border-radius: 8px; padding: 11px; width: 100%; font-weight: 600; font-size: 14px; }
    .btn-staff:hover { background: #2B5EA7; color: #fff; }
    .back-link   { font-size: 12px; color: #5a7a9a; text-align: center; margin-top: 16px; }
    .back-link a { color: #2B5EA7; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">Staff Sign In</div>
    <div class="login-sub">Panhandle EMS Education — Office Portal</div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-danger mb-3" style="font-size:12px;">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    {% if form.errors %}
      <div class="alert alert-danger mb-3" style="font-size:12px;">Incorrect email or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="username" class="form-control" placeholder="staff@email.com" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-staff">Sign in →</button>
    </form>

    <div class="back-link">
      Student portal? <a href="{% url 'login' %}">Sign in here</a>
    </div>
  </div>
</body>
</html>
