[build]
builder = "nixpacks"

[deploy]
startCommand = "export PYTHONUNBUFFERED=1 && python manage.py migrate --run-syncdb && python manage.py collectstatic --noinput && gunicorn pemse.wsgi --bind 0.0.0.0:${PORT:-8000} --workers 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "never"
