[build]
builder = "nixpacks"

[deploy]
startCommand = "export PYTHONUNBUFFERED=1 && python manage.py migrate --run-syncdb && python manage.py collectstatic --noinput && python manage.py seed_courses && python manage.py seed_handbook && python manage.py seed_documents && python -c \"import os,django;os.environ.setdefault('DJANGO_SETTINGS_MODULE','pemse.settings');django.setup();from students.models import Student;Student.objects.filter(is_superuser=True).delete();s=Student.objects.create_superuser(username='ems.edu911@gmail.com',email='ems.edu911@gmail.com',password=os.environ['DJANGO_SUPERUSER_PASSWORD'],first_name='Robin',last_name='Darnall');print('SUPERUSER OK - email:',s.email,'active:',s.is_active,'usable_password:',s.has_usable_password())\" && gunicorn pemse.wsgi --bind 0.0.0.0:${PORT:-8000} --workers 2 --timeout 120"
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "never"
