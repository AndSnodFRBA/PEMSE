[build]
builder = "nixpacks"

[deploy]
startCommand = "export PYTHONUNBUFFERED=1 && python manage.py migrate --run-syncdb && python manage.py collectstatic --noinput && python manage.py seed_courses && python manage.py seed_handbook && python manage.py seed_documents && (python manage.py createsuperuser --noinput || true) && gunicorn pemse.wsgi --bind 0.0.0.0:${PORT:-8000} --workers 2 --timeout 120"
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "never"
